<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Renamed favicon files (brand-knit.{svg,png}) to defeat Chrome's
         favicon cache. The ?v=2 query-string trick from v0.25.6 wasn't
         enough — Chrome was still loading the old rings-with-gold-heart
         icon. Switching to a different filename forces Chrome to fetch
         as a brand-new resource because it has no cache entry for it. -->
    <link rel="icon" type="image/svg+xml" href="/brand-knit.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/brand-knit.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=3" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#E11D48" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Knit" />
    <title>Knit</title>
    <meta name="description" content="Knit helps ward members form lasting friendships with the people the missionaries are teaching." />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7/dist/ionicons/ionicons.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
