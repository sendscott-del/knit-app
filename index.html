<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- ?v=2 cache-bust: Chrome maintains a separate favicon cache that
         ignores normal page refreshes, so it kept showing the pre-refresh
         icon (rings-with-gold-heart) even after we redeployed. Bumping
         this version string forces the browser to fetch a "new" file.
         Bump again on any future favicon change. -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#E11D48" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Knit" />
    <title>Knit</title>
    <meta name="description" content="Knit helps ward members form lasting friendships with the people the missionaries are teaching." />
    <script type="module" src="https://cdn.jsdelivr.net/npm/ionicons@7/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/ionicons@7/dist/ionicons/ionicons.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
